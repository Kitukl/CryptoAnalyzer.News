services:
  db:
    image: postgres:15-alpine
    container_name: postgres_news_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 435762198Oklik
      POSTGRES_DB: crypto_news_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crypto_network

networks:
  crypto_network:
    driver: bridge
    
volumes:
  postgres_data: